<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | Scopus Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25);
    }

    .brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 15px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: bold;
    }

    .brand h1 {
      color: #0f172a;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .brand p {
      color: #64748b;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 14px;
      font-weight: 600;
    }

    input {
      width: 100%;
      height: 50px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 0 15px;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
      background: #f8fafc;
    }

    input:focus {
      border-color: #2563eb;
      background: white;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(37, 99, 235, 0.35);
    }

    .switch {
      text-align: center;
      margin-top: 24px;
      color: #64748b;
      font-size: 14px;
    }

    .switch a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">S</div>
      <h1>Create Account</h1>
      <p>MJIIT Scopus Research Monitoring System</p>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullName" placeholder="Enter your full name">
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Create password">
    </div>

    <button class="btn" onclick="signUp()">Sign Up</button>

    <div class="switch">
      Already have an account?
      <a href="login.html">Login</a>
    </div>

    <div class="footer">
      © 2026 Scopus Dashboard Project
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>
</html>
